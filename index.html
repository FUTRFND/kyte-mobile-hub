<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0B0B0D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Kyte</title>
    <style>
      html, body, #root { background: #0B0B0D; color: #fff; margin: 0; min-height: 100vh; }
      #boot-fallback { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 24px; text-align: center; }
      #boot-fallback .brand { width: 56px; height: 56px; border-radius: 16px; background: #0098FF; margin: 0 auto 16px; }
      #boot-fallback .title { font-size: 18px; font-weight: 700; }
      #boot-fallback .sub { font-size: 13px; opacity: .6; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback shown if the JS bundle fails to load or parse. React removes this on mount. -->
      <div id="boot-fallback">
        <div>
          <div class="brand"></div>
          <div class="title">Kyte</div>
          <div class="sub">Loading…</div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var path = window.location.pathname;
        var isPackagedApp = window.location.protocol === "capacitor:" || window.location.protocol === "file:";
        if (isPackagedApp && path && path !== "/" && !window.location.hash) {
          window.location.replace("/#" + path + window.location.search);
        }
      })();
    </script>
    <script type="module" src="/src/main.mobile.tsx"></script>
    <script>
      (function () {
        var storageKey = "kyte.diagnostics.lastError.v1";
        function saveStartupError(source, detail) {
          try {
            window.localStorage.setItem(storageKey, JSON.stringify({
              source: source,
              message: detail && detail.message ? String(detail.message) : "App bundle failed to load",
              stack: detail && detail.stack ? String(detail.stack) : "",
              timestamp: new Date().toISOString(),
              route: window.location.pathname + window.location.search,
              userAgent: window.navigator.userAgent,
              buildVersion: "mobile-startup"
            }));
          } catch (_) {}
        }

        window.addEventListener("error", function (event) {
          var target = event && event.target;
          var isResourceError = target && target !== window && (target.tagName === "SCRIPT" || target.tagName === "LINK");
          if (!isResourceError) return;
          saveStartupError("startup.resource", {
            message: target.tagName + " failed to load: " + (target.src || target.href || "unknown resource")
          });
        }, true);

        window.addEventListener("error", function (event) {
          if (!event || !event.message) return;
          saveStartupError("startup.window", {
            message: event.message,
            stack: event.error && event.error.stack ? event.error.stack : ""
          });
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason;
          saveStartupError("startup.promise", {
            message: reason && reason.message ? reason.message : String(reason || "Unhandled promise rejection"),
            stack: reason && reason.stack ? reason.stack : ""
          });
        });
      })();

      // If the module script never executes (parse error, missing asset under the app scheme),
      // show a recoverable error state after 8s instead of an indefinite black/loading screen.
      setTimeout(function () {
        var fb = document.getElementById("boot-fallback");
        if (!fb) return; // React already mounted
        var diagnostic = null;
        try {
          diagnostic = JSON.parse(window.localStorage.getItem("kyte.diagnostics.lastError.v1") || "null");
        } catch (_) {}
        var details = diagnostic
          ? '<pre style="margin:18px auto 0;max-width:340px;max-height:220px;overflow:auto;text-align:left;white-space:pre-wrap;word-break:break-word;border:1px solid #333;border-radius:10px;padding:10px;color:#f5f5f5;background:#111;font-size:11px;line-height:1.4;">' +
            String((diagnostic.source || "startup") + "\n" + (diagnostic.message || "") + "\n" + (diagnostic.stack || "")).replace(/[&<>]/g, function (ch) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[ch]; }) +
            '</pre>'
          : '';
        fb.innerHTML = '<div><div class="title">Kyte failed to start</div>' +
          '<div class="sub">The app bundle didn\'t load. Please reopen the app.</div>' +
          details +
          '<button onclick="location.reload()" style="margin-top:20px;padding:10px 22px;border-radius:10px;background:#0098FF;color:#0B0B0D;font-weight:700;border:0;font-size:14px;">Reload</button></div>';
      }, 8000);
    </script>
  </body>
</html>
