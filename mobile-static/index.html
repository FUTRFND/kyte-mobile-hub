<!doctype html>
<html>
<head>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0b0b0d;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      padding: 80px 24px 40px;
    }

    input {
      display: block;
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      line-height: 24px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <main>
    <h1>Kyte Input Test</h1>
    <input
      type="text"
      placeholder="Type here"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
    />
  </main>
</body>
</html>
